networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  health:
    image: curlimages/curl
    container_name: health
    command: sleep infinity
    init: true
    networks:
      app_network:
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -s -o /dev/null -w '%{http_code}' http://portunus:8080/ping | grep -qE '^(200)$'"]
      interval: 15s
      timeout: 2s
      retries: 5
      start_period: 10s

  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack:community-archive
    networks:
      app_network:
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - DEBUG=${DEBUG:-0}
      - SERVICES=glue,kms,firehose,s3,dynamodb,sts,secretsmanager
      # test credentials to force the same account to be used by default
      - AWS_ACCESS_KEY_ID=000000000000
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=eu-west-2
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/00-init-main.sh"
      - "./scripts/localstack-init-firehose.sh:/etc/localstack/init/ready.d/01-init-firehose.sh"
      - "./scripts/localstack-init-async-analysis.sh:/etc/localstack/init/ready.d/02-init-async-analysis.sh"

  xray-daemon:
    image: amazon/aws-xray-daemon
    container_name: xray-daemon
    init: true
    networks:
      app_network:
        ipv4_address: 172.20.0.10  # Fixed IP address for X-Ray daemon
    ports:
      - "2000:2000/udp"
    environment:
      AWS_REGION: 'eu-west-2'
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
    command: -o

  proxy:
    build: proxy/
    init: true
    networks:
      app_network:
    ports:
      - "8888:8888"
    environment:
      TARGET_HOST_HTTP2_OPTIONS: "null"
      TARGET_HOST_TRANSPORT_SOCKET: "null"
      TARGET_HOST_USE_TLS: "false"
      PORTUNUS_TRANSPORT_SOCKET: "null"
      DOWNSTREAM_TLS_TRANSPORT_SOCKET: "null"
      API_KEY_HEADER: authorization
      API_KEY_PREFIX: "Bearer "
      LISTEN_PORT: 8888
      PORTUNUS_HOST: portunus
      PORTUNUS_PORT: 8080
      TARGET_HOST: http-bun
      TARGET_PORT: 80
      WS_TARGET_HOST: ws-echo  # Override for local WS testing (defaults to TARGET_HOST in prod)
      ENVOY_LOG_LEVEL: info
      AWS_XRAY_DAEMON_ADDRESS: 172.20.0.10 # note that DNS resolution does not work here
      # Uncomment the three env vars below to
      # enable rate-limiting
      # RATE_LIMIT_PERCENT_ENABLED: 100
      # RATE_LIMIT_INTERVAL_SECONDS: 2
      # RATE_LIMIT_REQUESTS_PER_INTERVAL: 1
    depends_on:
      - xray-daemon

  redis:
    image: redis:alpine
    init: true
    networks:
      app_network:
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_secure_password
    environment:
      REDIS_PASSWORD: redis_secure_password

  portunus:
    depends_on:
      - proxy
      - redis
      - xray-daemon
    build: portunus/
    container_name: portunus
    init: true
    networks:
      app_network:
    # x-ray console can automatically display relevant cloudwatch logs by querying
    # the group for a matching trace id. If you want to log docker to cloudwatch,
    # you must put credentials in /root/.aws/credentials default profile
    # in order to override aninstance profile.
    # It is not enough to paste them in as env vars.
    # Comment this out you don't want to log to cloudwatch.
    #
    # logging:
    #   driver: awslogs
    #   options:
    #     awslogs-region: "eu-west-2"  # Replace with your region
    #     awslogs-group: "/aws/portunus"  # Your log group
    #     awslogs-create-group: "true"
    environment:
      AWS_DEFAULT_REGION: 'eu-west-2'
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      # AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      LOG_LEVEL: info
      LISTEN_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_secure_password
      CACHE_DURATION: 172800
      AWS_XRAY_SDK_ENABLED: true
      AWS_XRAY_DAEMON_ADDRESS: "172.20.0.10:2000"
      AWS_XRAY_LOG_GROUP: /aws/portunus
      # Localstack endpoint. Unset to make real AWS requests
      AWS_ENDPOINT_URL: http://localstack:4566
      REDIS_USE_TLS: "false"
      # Firehose delivery stream configuration for local testing
      FIREHOSE_METADATA_STREAM: portunus-stream-metadata
      FIREHOSE_REQUEST_HEADERS_STREAM: portunus-stream-request-headers
      FIREHOSE_REQUEST_BODY_STREAM: portunus-stream-request-body
      FIREHOSE_REQUEST_TRAILERS_STREAM: portunus-stream-request-trailers
      FIREHOSE_RESPONSE_HEADERS_STREAM: portunus-stream-response-headers
      FIREHOSE_RESPONSE_BODY_STREAM: portunus-stream-response-body
      FIREHOSE_RESPONSE_TRAILERS_STREAM: portunus-stream-response-trailers

  ws-echo:
    build: ws-echo
    container_name: ws-echo
    init: true
    networks:
      app_network:
    environment:
      PORT: "80"

  http-bin:
    image: sharat87/httpbun
    container_name: http-bun
    init: true
    networks:
      app_network:
