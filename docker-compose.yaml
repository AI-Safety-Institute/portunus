networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  health:
    image: curlimages/curl
    container_name: health
    command: sleep infinity
    init: true
    networks:
      app_network:
    healthcheck:
      # Portunus has no HTTP surface (FastAPI was removed; it serves only
      # gRPC on :9000). Envoy still answers ``/ping`` on its listener (8888)
      # with the auth/proc filters disabled per-route, so that's the smoke
      # signal that the proxy task is up. Portunus' own liveness is the gRPC
      # health service, probed by ECS via grpc_health_probe in prod.
      test: ["CMD", "sh", "-c", "curl -s -o /dev/null -w '%{http_code}' http://proxy:8888/ping | grep -qE '^(200)$'"]
      interval: 15s
      timeout: 2s
      retries: 5
      start_period: 10s

  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack:community-archive
    networks:
      app_network:
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - DEBUG=${DEBUG:-0}
      - SERVICES=glue,kms,kinesis,firehose,s3,dynamodb,sts,secretsmanager
      # test credentials to force the same account to be used by default
      - AWS_ACCESS_KEY_ID=000000000000
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=eu-west-2
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/00-init-main.sh"
      - "./scripts/localstack-init-firehose.sh:/etc/localstack/init/ready.d/01-init-firehose.sh"
      - "./scripts/localstack-init-async-analysis.sh:/etc/localstack/init/ready.d/02-init-async-analysis.sh"

  xray-daemon:
    image: amazon/aws-xray-daemon
    container_name: xray-daemon
    init: true
    networks:
      app_network:
        ipv4_address: 172.20.0.10  # Fixed IP address for X-Ray daemon
    ports:
      - "2000:2000/udp"
    environment:
      AWS_REGION: 'eu-west-2'
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
    command: -o

  proxy:
    build: proxy/
    init: true
    networks:
      app_network:
    # Publishes the Envoy listener (8888). Portunus shares this container's
    # network namespace and serves only gRPC on loopback 127.0.0.1:9000
    # (reached by Envoy's ext_authz/ext_proc filters) — there's no HTTP
    # surface to publish since FastAPI was removed.
    ports:
      - "8888:8888"
    environment:
      TARGET_HOST_HTTP2_OPTIONS: "null"
      TARGET_HOST_TRANSPORT_SOCKET: "null"
      TARGET_HOST_USE_TLS: "false"
      PORTUNUS_TRANSPORT_SOCKET: "null"
      DOWNSTREAM_TLS_TRANSPORT_SOCKET: "null"
      API_KEY_HEADER: authorization
      API_KEY_PREFIX: "Bearer "
      LISTEN_PORT: 8888
      TARGET_HOST: http-bun
      TARGET_PORT: 80
      # Route WS upgrades to the dedicated ws-echo container, but keep
      # plain HTTP at http-bun. Prod typically routes both at the same
      # provider host (entrypoint.sh defaults WS_TARGET_HOST to
      # TARGET_HOST); this override exists so the docker-compose
      # behaviour tests can exercise WS round-trips without needing a
      # provider that responds to both protocols.
      WS_TARGET_HOST: ws-echo
      WS_TARGET_PORT: 80
      # ws-echo speaks HTTP/1.1 plaintext, so disable the cluster's TLS
      # transport socket. h2 pinning is no longer env-var-driven —
      # ws_upstream is fixed to HTTP/1.1 at config level via
      # typed_extension_protocol_options.
      WS_TARGET_HOST_TRANSPORT_SOCKET: "null"
      ENVOY_LOG_LEVEL: info
      AWS_XRAY_DAEMON_ADDRESS: 172.20.0.10 # note that DNS resolution does not work here
      # Uncomment the three env vars below to
      # enable rate-limiting
      # RATE_LIMIT_PERCENT_ENABLED: 100
      # RATE_LIMIT_INTERVAL_SECONDS: 2
      # RATE_LIMIT_REQUESTS_PER_INTERVAL: 1
    depends_on:
      - xray-daemon

  redis:
    image: redis:alpine
    init: true
    networks:
      app_network:
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_secure_password
    environment:
      REDIS_PASSWORD: redis_secure_password

  portunus:
    depends_on:
      - proxy
      - redis
      - xray-daemon
    build: portunus/
    container_name: portunus
    init: true
    # Share the proxy container's network namespace so this mirrors the
    # prod Fargate-sidecar layout: Envoy dials portunus over loopback
    # (``127.0.0.1:9000`` in ``proxy/envoy.yaml``), and there's exactly one
    # network endpoint to think about. Because the namespace is shared,
    # portunus cannot publish its own port mappings — the ``proxy`` service
    # publishes 8080 on its behalf for the bridged ``health`` smoke probe.
    network_mode: "service:proxy"
    # x-ray console can automatically display relevant cloudwatch logs by querying
    # the group for a matching trace id. If you want to log docker to cloudwatch,
    # you must put credentials in /root/.aws/credentials default profile
    # in order to override aninstance profile.
    # It is not enough to paste them in as env vars.
    # Comment this out you don't want to log to cloudwatch.
    #
    # logging:
    #   driver: awslogs
    #   options:
    #     awslogs-region: "eu-west-2"  # Replace with your region
    #     awslogs-group: "/aws/portunus"  # Your log group
    #     awslogs-create-group: "true"
    environment:
      AWS_DEFAULT_REGION: 'eu-west-2'
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      # AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_secure_password
      CACHE_DURATION: 172800
      AWS_XRAY_SDK_ENABLED: true
      AWS_XRAY_DAEMON_ADDRESS: "172.20.0.10:2000"
      AWS_XRAY_LOG_GROUP: /aws/portunus
      # Localstack endpoint. Unset to make real AWS requests
      AWS_ENDPOINT_URL: http://localstack:4566
      REDIS_USE_TLS: "false"
      # Firehose direct-PUT delivery streams for local testing. Names
      # must match the streams created by scripts/localstack-init.sh.
      FIREHOSE_METADATA_STREAM: portunus-firehose-metadata
      FIREHOSE_REQUEST_HEADERS_STREAM: portunus-firehose-request-headers
      FIREHOSE_REQUEST_BODY_STREAM: portunus-firehose-request-body
      FIREHOSE_REQUEST_TRAILERS_STREAM: portunus-firehose-request-trailers
      FIREHOSE_RESPONSE_HEADERS_STREAM: portunus-firehose-response-headers
      FIREHOSE_RESPONSE_BODY_STREAM: portunus-firehose-response-body
      FIREHOSE_RESPONSE_TRAILERS_STREAM: portunus-firehose-response-trailers
      FIREHOSE_WS_SUMMARY_STREAM: portunus-firehose-ws-summary
      # Header prefix the proxy uses; pass it to portunus too so denied
      # responses carry ``x-{prefix}-error: true`` matching the legacy
      # Lua-filter contract.
      PORTUNUS_HEADER_PREFIX: aisi-proxy
      # gRPC ext_authz + ext_proc server: required for the new Envoy filter
      # chain to function. Without this, ext_authz connects-refused → 403.
      GRPC_ENABLED: "true"
      GRPC_PORT: "9000"
      # Empty proxy_api_key disables the proxy-identity check (test-only mode);
      # docker-compose's proxy container reaches this server over the
      # ``app_network`` bridge, not over Service Connect, so the SC-namespace
      # identity gate that motivates the key in prod doesn't apply locally.
      # ``GRPC_PROXY_API_KEY_OPTIONAL=true`` acknowledges the gate is
      # disabled; without it the server fails closed on startup.
      GRPC_PROXY_API_KEY: ""
      GRPC_PROXY_API_KEY_OPTIONAL: "true"

  ws-echo:
    build: ws-echo
    container_name: ws-echo
    init: true
    networks:
      app_network:
    environment:
      PORT: "80"

  http-bin:
    image: sharat87/httpbun
    container_name: http-bun
    init: true
    networks:
      app_network:
