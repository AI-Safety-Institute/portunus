# WebSocket echo server for local WS relay testing.
# Usage: docker compose -f docker-compose.yaml -f docker-compose.ws.yaml up --build --wait
# Or just: docker compose up (if using docker-compose.override.yaml symlink)
services:
  ws-echo:
    image: jmalloc/echo-server
    container_name: ws-echo
    init: true
    networks:
      app_network:
    environment:
      PORT: "8080"
