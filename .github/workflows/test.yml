name: Test using Pytest

on:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Check pytest collection
        run: |
          echo "Expected collection is around 160 tests: root tests plus portunus/tests."
          uv run pytest --collect-only -q

      - name: Test with pytest
        run: uv run pytest -rA -x --color=yes
        env:
          DUMP_DOCKER_LOGS_ON_FAILURE: "true"
