name: Publish images

# Builds the three container images (backend, proxy, ws-echo) and publishes
# them to GitHub Container Registry.
#
# - Pull requests: build only (no push) — validates the Dockerfiles.
# - Pushes to main: publish `main` + `sha-<commit>` tags.
# - Version tags (v*): publish semver tags (e.g. 0.6.0, 0.6) + `latest`.
#
# Images are named after their directory in this repo:
#   ghcr.io/<owner>/portunus/portunus
#   ghcr.io/<owner>/portunus/proxy
#   ghcr.io/<owner>/portunus/ws-echo

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - portunus
          - proxy
          - ws-echo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          # semver {{raw}} keeps the leading "v" (v0.6.0) so image tags match
          # git tags verbatim — consumers can reuse the same pin string.
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.image }}
          # arm64 is built under QEMU emulation — slower, but runner minutes
          # are free for public repos. All pinned base images are multi-arch
          # manifest lists, and the proxy Dockerfile selects yq per TARGETARCH.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
