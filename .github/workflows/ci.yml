name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Lint, format, type-check and proto checks all run via the single prek
  # hook set (.pre-commit-config.yaml) — the same one developers run locally.
  checks:
    uses: ./.github/workflows/lint.yml
    secrets: inherit
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit
