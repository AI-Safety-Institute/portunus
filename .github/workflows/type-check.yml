name: Type check using Mypy

on:
  workflow_call:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Type check with mypy
        run: uv run mypy portunus/ tests/
