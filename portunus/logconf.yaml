version: 1
disable_existing_loggers: False
formatters:
  default:
    # Use your custom formatter for all logs
    "()": "portunus.logging.StructuredLogFormatter"
    format: "%(asctime)s - TraceID: %(trace_id)s - %(name)s - %(levelname)s - %(message)s"
  access:
    "()": "portunus.logging.StructuredLogFormatter"
    format: "%(asctime)s - TraceID: %(trace_id)s - %(name)s - %(levelname)s - %(message)s"
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn.error:
    level: INFO
    handlers:
      - default
    propagate: no
  uvicorn.access:
    # Set to WARNING to effectively disable default access logs
    level: WARNING
    handlers:
      - access
    propagate: no
  api.access:  # This logger is used by your LoggingMiddleware
    level: INFO
    handlers:
      - access
    propagate: no
root:
  level: INFO
  handlers:
    - default
  propagate: no
