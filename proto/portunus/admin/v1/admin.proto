syntax = "proto3";

// Portunus operational admin API.
//
// Served on the same in-task gRPC server as the Envoy ext_authz / ext_proc
// filters (127.0.0.1:9000), reachable only over task loopback. Callers must
// present the shared proxy key in the `x-portunus-proxy-key` metadata, exactly
// as the ext_authz / ext_proc services require — there is no separate
// authentication surface.
//
// Trigger from an operator shell with grpcurl over `aws ecs execute-command`,
// e.g.:
//   grpcurl -plaintext \
//     -H "x-portunus-proxy-key: $GRPC_PROXY_API_KEY" \
//     127.0.0.1:9000 portunus.admin.v1.AdminService/FlushCache
// Server reflection is enabled, so no local .proto copy is needed.
//
// Package `portunus.admin.v1` → generated Python lands as a real submodule of
// the installed `portunus` package (portunus/admin/v1/), so the stubs import
// each other by normal absolute import with no sys.path manipulation.
package portunus.admin.v1;

// AdminService exposes operational actions that previously lived on the
// retired FastAPI REST surface (`POST /cache/flush`).
service AdminService {
  // FlushCache clears the entire Redis auth cache, forcing every subsequent
  // request to re-authenticate against AWS. Use after a cached upstream key
  // may have been compromised. Idempotent.
  rpc FlushCache(FlushCacheRequest) returns (FlushCacheResponse);
}

message FlushCacheRequest {}

message FlushCacheResponse {
  // True if the cache was flushed; false if the cache backend was unreachable.
  bool success = 1;
  // Human-readable detail for operators (e.g. "auth cache flushed" or the
  // failure reason). Never contains secret material.
  string message = 2;
}
